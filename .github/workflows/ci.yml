name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r bootstrap/requirements-dev.txt

      - name: Lint
        run: make -C bootstrap lint

      - name: Tests + couverture
        run: make -C bootstrap test
        # pytest.ini configure --cov et --cov-fail-under=65

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: bootstrap/.coverage
          retention-days: 30

  smoke:
    name: Smoke test binaire
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install -r bootstrap/requirements-dev.txt

      - name: Build binary
        run: make -C bootstrap build

      - name: Smoke — le binaire démarre et affiche l'aide
        run: |
          bootstrap/dist/r2bewi --help
          bootstrap/dist/r2bewi --help | grep -q "r2bewi"
