name: dnsmasq
description: DNS/DHCP — résolution locale et baux DHCP pour le LAN robot
kind: [server]
deploy_order: 20
setup: setup.deploy
defaults:
  server:
    - dnsmasq.conf
    - r2bewi-nodes.conf
packages:
  - dnsmasq
node_files:
  server:
    dnsmasq.conf: /etc/dnsmasq.d/r2bewi.conf
    r2bewi-nodes.conf: /etc/dnsmasq.d/r2bewi-nodes.conf
managed_paths:
  server:
    - /etc/dnsmasq.d/r2bewi.conf
    - /etc/dnsmasq.d/r2bewi-nodes.conf
cli: {}
