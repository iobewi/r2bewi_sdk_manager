# r2bewi — nœuds statiques et alias DNS/DHCP
# Ce fichier est géré manuellement — ajouter les nœuds à IP fixe ou les alias.
#
# IP fixe par MAC (DHCP statique + DNS automatique via bail) :
#   dhcp-host=aa:bb:cc:dd:ee:ff,192.168.82.10,rpibewi-01
#
# Alias DNS (sans DHCP) :
#   address=/alias.r2bewi.internal/192.168.82.1
#
# Les nœuds en DHCP dynamique sont résolus automatiquement par dnsmasq
# via le fichier de baux (/var/lib/misc/dnsmasq.leases).
