# r2bewi — DNS / DHCP LAN robot
# Editer : lease_time, domain, dns_upstream si besoin
# __IP__ et __HOSTNAME__ sont substitués par r2bewi init
interface=br0
interface=__EXT_IF__
bind-dynamic
domain=r2bewi.internal

dhcp-range=__DHCP_START__,__DHCP_END__,255.255.255.0,12h
dhcp-option=option:router,__IP__
dhcp-option=option:dns-server,__IP__
dhcp-option=option:ntp-server,__IP__

# Bastion lui-même
address=/__HOSTNAME__.r2bewi.internal/__IP__
# Alias stables indépendants du hostname
address=/k3s.r2bewi.internal/__IP__
address=/registry.r2bewi.internal/__IP__
# rétrocompatibilité mDNS
address=/__HOSTNAME__.local/__IP__
server=1.1.1.1
server=8.8.8.8
