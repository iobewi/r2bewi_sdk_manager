name: netplan
description: Configuration réseau — netplan bridge + uplink
kind: [server]
deploy_order: 10
setup: setup.deploy
defaults:
  server:
    - netplan.yaml
packages:
  - bridge-utils
  - iproute2
node_files:
  server:
    netplan.yaml: /etc/netplan/50-r2bewi.yaml
managed_paths:
  server:
    - /etc/netplan/50-r2bewi.yaml
cli: {}
